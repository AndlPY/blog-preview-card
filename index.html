<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice 3 | Blog Preview Card</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <article class="blog-card" aria-labelledby="card-title">
      <img
        class="blog-card__image"
        src="./assets/images/Blog Image.png"
        alt="Абстрактна ілюстрація з геометричними фігурами"
      >

      <div class="blog-card__content">
        <p class="blog-card__tag">HTML &amp; CSS</p>
        <p class="blog-card__date">Публікація 1 Вересня 2025</p>

        <h2 class="blog-card__title" id="card-title">
          <a href="#">Практична №3</a>
        </h2>

        <p class="blog-card__description">
          Мета практичної роботи полягає в тому, щоб налаштувати середовище розробки <strong>VS Code</strong>, а також реалізувати картку блогу для вдосконалення фундаментальних навичок з <strong>HTML та CSS</strong>.
        </p>
      </div>

      <footer class="blog-card__author">
        <img src="./assets/images/avatar_male.png" alt="" aria-hidden="true">
        <p>&lt;Батраков Андрій&gt;</p>
      </footer>
    </article>
  </main>
</body>
</html>
